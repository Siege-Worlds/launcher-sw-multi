name: Windows Signed Build

on:
  workflow_dispatch:

jobs:
  build-signed-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Preflight secrets check
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}")) {
            throw "Secret WINDOWS_CODESIGN_PFX_BASE64 is not set."
          }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_CODESIGN_PASSWORD }}")) {
            throw "Secret WINDOWS_CODESIGN_PASSWORD is not set."
          }

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        shell: pwsh
        run: cargo install tauri-cli --version "^2"

      - name: Build Windows bundles
        working-directory: src-tauri
        shell: pwsh
        run: cargo tauri build --bundles nsis,msi

      - name: Decode code-signing certificate
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          try {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}"))
          } catch {
            throw "Secret WINDOWS_CODESIGN_PFX_BASE64 is not valid base64."
          }
          "PFX_PATH=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sign installer artifacts
        shell: pwsh
        env:
          PFX_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_PASSWORD)) {
            throw "Secret WINDOWS_CODESIGN_PASSWORD is not set."
          }

          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            throw "signtool.exe not found on runner."
          }

          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.msi') }

          if (-not $artifacts) {
            throw "No .exe or .msi artifacts found to sign."
          }

          foreach ($artifact in $artifacts) {
            & $signtool.FullName sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 /f "$env:PFX_PATH" /p "$env:PFX_PASSWORD" "$($artifact.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Signing failed for $($artifact.FullName)"
            }
          }

      - name: Verify signatures
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          $artifacts = Get-ChildItem "src-tauri/target/release/bundle" -Recurse -File |
            Where-Object { $_.Extension -in @('.exe', '.msi') }

          foreach ($artifact in $artifacts) {
            & $signtool.FullName verify /pa /v "$($artifact.FullName)"
            if ($LASTEXITCODE -ne 0) {
              throw "Signature verification failed for $($artifact.FullName)"
            }
          }

      - name: Upload signed bundles
        uses: actions/upload-artifact@v4
        with:
          name: signed-windows-bundles
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
