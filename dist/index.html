<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Siege Worlds Launcher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Slideshow Background -->
  <div id="slideshow">
    <img class="slide active" src="img/background.jpg" alt="" />
    <img class="slide" src="img/swlauncher_2.jpg" alt="" />
    <img class="slide" src="img/swlauncher_3.jpg" alt="" />
  </div>

  <!-- Dark Overlay -->
  <div id="overlay"></div>

  <!-- Main Content -->
  <div id="app">
    <!-- Header: User info / Sign In -->
    <div id="header">
      <div id="user-area">
        <div id="signed-out">
          <button id="btn-signin" class="btn btn-secondary">Sign In</button>
        </div>
        <div id="signed-in" style="display:none">
          <div id="user-cic"></div>
          <span id="user-name"></span>
          <button id="btn-signout" class="btn btn-small">Sign Out</button>
        </div>
      </div>
      <button id="btn-settings" class="btn btn-icon" title="Settings">&#9881;</button>
    </div>

    <!-- Center spacer -->
    <div id="center"></div>

    <!-- Bottom Controls -->
    <div id="controls">
      <!-- Install Path -->
      <div id="path-row">
        <label>Install Path:</label>
        <input type="text" id="install-path" readonly />
        <button id="btn-browse" class="btn btn-secondary">Browse</button>
      </div>

      <!-- Progress Bar -->
      <div id="progress-container" style="display:none">
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
        <span id="progress-text">0%</span>
      </div>

      <!-- Action Buttons -->
      <div id="action-row">
        <button id="btn-check" class="btn btn-secondary">Check Updates</button>
        <button id="btn-play" class="btn btn-primary">PLAY</button>
      </div>

      <!-- Console Log -->
      <div id="console">
        <div id="console-log"></div>
      </div>
    </div>
  </div>

  <!-- Settings Panel (hidden by default) -->
  <div id="settings-panel" style="display:none">
    <div id="settings-content">
      <h2>Settings</h2>
      <div class="setting-group">
        <label>Build Server URL</label>
        <input type="text" id="set-build-url" />
      </div>
      <div class="setting-group">
        <label>SSO URL</label>
        <input type="text" id="set-sso-url" />
      </div>
      <div class="setting-group">
        <label>Code Signing Identity (macOS)</label>
        <input type="text" id="set-signing-identity" placeholder="Developer ID Application: ..." />
      </div>
      <div class="setting-group">
        <label>Apple Team ID</label>
        <input type="text" id="set-apple-team" placeholder="XXXXXXXXXX" />
      </div>
      <div class="setting-group">
        <label>Windows Certificate Path</label>
        <input type="text" id="set-win-cert" placeholder="C:\certs\certificate.pfx" />
      </div>
      <div id="settings-buttons">
        <button id="btn-settings-save" class="btn btn-primary">Save</button>
        <button id="btn-settings-cancel" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
